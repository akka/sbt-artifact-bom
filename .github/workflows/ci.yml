name: CI

on:
  pull_request:

jobs:
  scripted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Run scripted tests
        run: sbt scripted
